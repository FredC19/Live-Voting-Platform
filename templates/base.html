<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Voting Platform{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      color: #222;
      background: #fff;
      line-height: 1.6;
    }

    header {
      padding: 40px 20px 20px;
      background: #6c5b7b;
      border-bottom: 1px solid #5a4a68;
    }

    nav a {
      margin-right: 20px;
      text-decoration: none;
      color: #444;
    }

    nav a:hover {
      color: #000;
    }

    main {
      max-width: 760px;
      margin: 60px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 16px;
      color: #333;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 0.85rem;
      color: #999;
      border-top: 1px solid #ddd;
      background: #f2f2f2;
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    {% block content %}
    {% endblock %}
  </main>

  <footer>
    <p>&copy; 2026 Your Name</p>
  </footer>

</body>
</html>
