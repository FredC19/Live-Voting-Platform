{% for poll in polls.items %}
  <div class="poll-card">
    <strong>{{ poll.question }}</strong><br>

    <button 
      class="button-50"
      hx-post="{{ url_for('vote', poll_id=poll.id) }}"
      hx-target="#poll-result-{{ poll.id }}"
      hx-swap="innerHTML"
      name="choice"
      value="A"
    >
      {{ poll.option_a }}
    </button>

    <button 
      class="button-50"
      hx-post="{{ url_for('vote', poll_id=poll.id) }}"
      hx-target="#poll-result-{{ poll.id }}"
      hx-swap="innerHTML"
      name="choice"
      value="B"
    >
      {{ poll.option_b }}
    </button>

    <div id="poll-result-{{ poll.id }}"></div>
  </div>
{% endfor %}

{% if polls.has_next %}
  <div 
    hx-get="/load_polls?page={{ polls.next_num }}" 
    hx-trigger="revealed"
    hx-swap="afterend"
  ></div>
{% endif %}
