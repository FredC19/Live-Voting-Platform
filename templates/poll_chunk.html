{% for poll in polls.items %}
  <div class="poll" style="margin-bottom: 20px;">
    <strong>{{ poll.question }}</strong><br>

    <div 
      hx-target="#poll-result-{{ poll.id }}" 
      hx-swap="innerHTML"
    >
      <button 
        class="button-50"
        hx-post="{{ url_for('vote', poll_id=poll.id) }}"
        name="choice"
        value="A"
      >
        {{ poll.option_a }}
      </button>

      <button 
        class="button-50"
        hx-post="{{ url_for('vote', poll_id=poll.id) }}"
        name="choice"
        value="B"
      >
        {{ poll.option_b }}
      </button>
    </div>

    <div class="bar-container">
      <div class="bar-label">
        {{ poll.option_a }} — {{ poll.percent_a() }}%
      </div>
      <div class="bar">
        <div class="bar-fill" style="width: {{ poll.percent_a() }}%;"></div>
      </div>

      <div class="bar-label">
        {{ poll.option_b }} — {{ poll.percent_b() }}%
      </div>
      <div class="bar">
        <div class="bar-fill" style="width: {{ poll.percent_b() }}%;"></div>
      </div>
    </div>

    <div id="poll-result-{{ poll.id }}"></div>
  </div>
{% endfor %}

{% if polls.has_next %}
  <div 
    hx-get="/load_polls?page={{ polls.next_num }}"
    hx-trigger="revealed"
    hx-swap="afterend"
  ></div>
{% endif %}
